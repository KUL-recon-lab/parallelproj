# pixi.toml -- pixi manifest for parallelproj.
#
# This project uses pixi-build-python to build parallelproj into a conda
# package directly from the source tree.  The package is then a conda
# path-dep in [dependencies] below; ``pixi install`` builds it in editable
# mode automatically.
#
# See:
#   * https://pixi.prefix.dev/latest/reference/pixi_manifest/
#   * https://pixi.prefix.dev/latest/build/backends/pixi-build-python/
#   * https://pixi.prefix.dev/latest/build/python/
#
# Quick start:
#   pixi install                 # default env (runtime-only, Python 3.12)
#   pixi run test                # run the test suite (Python 3.12)
#   pixi run -e test-py-latest test
#                                # run the test suite (newest Python)
#   pixi run -e docs docs        # build the documentation locally
#   pixi run -e cuda12 test      # run tests against a CUDA 12 stack
#   pixi run -e cuda13 test      # run tests against a CUDA 13 stack

# ---------------------------------------------------------------------------
# Workspace metadata.  These fields can be inherited by [package] below via
# the ``{ workspace = true }`` syntax, so we only keep the canonical values
# here.
# ---------------------------------------------------------------------------

[workspace]
name = "parallelproj"
description = "Python tools for PET projection and reconstruction workflows."
authors = ["Georg Schramm <georg.schramm@kuleuven.be>"]
license = "Apache-2.0"
license-file = "LICENSE"
readme = "README.md"
homepage = "https://parallelproj.readthedocs.io/"
repository = "https://github.com/gschramm/parallelproj"
documentation = "https://parallelproj.readthedocs.io/"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]
preview = ["pixi-build"]

# ---------------------------------------------------------------------------
# Package definition consumed by pixi-build-python.
#
# IMPORTANT: ``version`` is static and must be kept in sync with
# ``[project].version`` in pyproject.toml.  Bumping the version on a
# release requires editing *both* files.  (The duplication is the cost of
# not using setuptools-scm.)
# ---------------------------------------------------------------------------

[package]
name = "parallelproj"
version = "2.0.0"
description = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
license-file = { workspace = true }
readme = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
documentation = { workspace = true }

[package.build]
# Pin to a minor for stability across pixi-build-python's own preview
# iteration.  Bump when you've validated a new backend release.
# ``channels`` is omitted so pixi uses its built-in defaults for resolving
# the build backend and build-time conda deps.
backend = { name = "pixi-build-python", version = "0.4.*" }

[package.host-dependencies]
# Build-time deps: what hatchling needs to produce the wheel.
python = "*"
hatchling = "*"

[package.run-dependencies]
# Runtime deps: what every consumer of the built parallelproj conda
# package needs.  Mirrors what the conda-forge feedstock declares.
parallelproj-core = ">=2.0.5"
numpy = ">=1.23"
scipy = ">=1.15"
array-api-compat = ">=1.7"
matplotlib = "*"

# ---------------------------------------------------------------------------
# Workspace-level dependencies (i.e. what shows up in every environment).
#
# The only "dependency" the workspace itself declares is the local package,
# referenced as a path-dep so pixi-build-python builds and installs it.
# Its run-dependencies (declared above) are pulled in transitively.
# ---------------------------------------------------------------------------

[dependencies]
parallelproj = { path = "." }

# ---- Python-version features ----
#
# Each environment below picks exactly one of these so its Python version
# is unambiguous.  Add a new ``py3xx`` feature when a new Python release
# is worth pinning to.

[feature.py312.dependencies]
python = "3.12.*"

[feature.py-latest.dependencies]
python = ">=3.13"

# ---- test feature ----

[feature.test.dependencies]
pytest = ">=8"
pytest-cov = "*"
array-api-strict = "*"
pytorch = "*"

[feature.test.tasks]
test = "pytest tests/ -v"
test-cov = "pytest tests/ --cov=parallelproj --cov-report=term-missing"

# ---- docs feature ----

[feature.docs.dependencies]
sphinx = "*"
sphinx-gallery = "*"
sphinx-design = "*"
furo = "*"
sphinxcontrib-bibtex = "*"
joblib = "*"        # used by sphinx-gallery for parallel example execution
pytorch = "*"        # docs/examples/05_torch/01_run_projection_layer.py uses torch

[feature.docs.tasks]
docs = "sphinx-build -b html docs docs/_build/html"
docs-clean = "rm -rf docs/_build docs/auto_examples"

# ---- CUDA 12 stack ----
#
# GPU environments only make sense on linux-64 (where conda-forge ships
# CUDA-enabled builds of pytorch and cupy).  The cuda-version constraint
# plus system-requirements.cuda steer the solver towards the cuda-12
# variants of pytorch/cupy automatically.

[feature.cuda12]
platforms = ["linux-64"]
system-requirements = { cuda = "12" }

[feature.cuda12.dependencies]
cuda-version = "12.*"
cupy = "*"

# ---- CUDA 13 stack ----

[feature.cuda13]
platforms = ["linux-64"]
system-requirements = { cuda = "13" }

[feature.cuda13.dependencies]
cuda-version = "13.*"
cupy = "*"

# ---- environments ----
#
# Each entry composes one or more features into a named environment that
# pixi can solve, lock, and install independently.  Every env picks
# exactly one Python-version feature (``py312`` or ``py-latest``) so its
# Python version is unambiguous.
#
#   default        - minimal "runtime only" env -- just parallelproj + its
#                    run-dependencies on Python 3.12.  Useful for
#                    ``pixi shell``-based interactive use, notebooks, or
#                    downstream consumers who don't need the test stack.
#   test           - default + pytest / array-api-strict / pytorch on
#                    Python 3.12 (CPU).
#   test-py-latest - same as ``test`` but on the newest available Python.
#   docs           - default + sphinx + sphinx-gallery + friends on
#                    Python 3.12.
#   cuda12         - test + CUDA 12 (pytorch & cupy resolve to cuda-12 builds).
#   cuda13         - test + CUDA 13 (pytorch & cupy resolve to cuda-13 builds).
#
# Order matters when tasks are shared across envs: ``pixi run <task>``
# picks the first env that has the task.  Putting ``test`` before
# ``test-py-latest`` makes ``pixi run test`` default to the Python 3.12
# env, which is what we want for local development.

[environments]
default = { features = ["py312"] }
test = { features = ["test", "py312"] }
test-py-latest = { features = ["test", "py-latest"] }
docs = { features = ["docs", "py312"] }
cuda12 = { features = ["test", "cuda12", "py312"] }
cuda13 = { features = ["test", "cuda13", "py312"] }
