name: Bug report
description: Report a problem with the pure-Python parallelproj package
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug!

        Note: this repository is the pure-Python front end. Problems with the
        compiled C/CUDA kernels belong in
        [`libparallelproj`](https://github.com/KUL-recon-lab/libparallelproj).
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest code snippet that reproduces the problem.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: parallelproj version
      placeholder: "e.g. 2.0.0"
    validations:
      required: true
  - type: input
    id: core-version
    attributes:
      label: parallelproj-core version
      placeholder: "e.g. 2.0.7"
    validations:
      required: false
  - type: dropdown
    id: backend
    attributes:
      label: Array backend / device
      options:
        - numpy (CPU)
        - array_api_strict
        - PyTorch (CPU)
        - PyTorch (CUDA)
        - CuPy (CUDA)
        - other / multiple
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Ubuntu 24.04, Windows 11, macOS 14"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Traceback / logs
      description: Paste the full error message or traceback, if any.
      render: shell
    validations:
      required: false
