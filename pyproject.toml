[build-system]
requires = ["setuptools>=80", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "parallelproj"
dynamic = ["version"]
description = "Python tools for PET projection and reconstruction workflows."
readme = "README.md"
requires-python = ">=3.12"
license = {text = "Apache-2.0"}
authors = [
  {name = "Georg Schramm"},
]
# Runtime dependencies are intentionally NOT enumerated here.
#
# ``parallelproj`` is distributed only via conda-forge.  The two channels
# that actually install the package have their own dependency declarations:
#
#   * the conda-forge feedstock (recipe/meta.yaml) -> ``conda install``
#   * ``[tool.pixi.dependencies]`` further down in this file        -> ``pixi install``
#
# Enumerating the runtime deps again under PEP 621 would just duplicate them
# and force a "conda-or-PyPI?" decision every time they change.  The conda
# answer is canonical for this project, so [tool.pixi.dependencies] is the
# single source of truth on the pixi side.  ``parallelproj-core`` (the binary
# backend) is conda-forge-only and listing it here would also break PyPI
# resolution.
dependencies = []

# NOTE: there is intentionally no ``[project.optional-dependencies]`` block.
# Test- and docs-time dependencies are declared once, conda-forge-side,
# under ``[tool.pixi.feature.test.dependencies]`` and
# ``[tool.pixi.feature.docs.dependencies]``.  Pixi auto-imports any
# ``[project.optional-dependencies]`` entries as features with the same
# name, which would then *merge* with the explicit ``[tool.pixi.feature.*]``
# blocks below and pull duplicate definitions in from PyPI.

[tool.setuptools_scm]
parentdir_prefix_version = "v"
fallback_version = "0.0.0"
version_scheme = "no-guess-dev"
local_scheme = "node-and-date"

[tool.pytest.ini_options]
testpaths = ["tests"]

# ---------------------------------------------------------------------------
# pixi configuration
# ---------------------------------------------------------------------------
#
# This section configures the pixi package manager (https://pixi.sh/) for
# development, testing, documentation, and GPU workflows.  Pixi reads the
# project metadata from [project] above (name, version, dependencies) and
# augments it with conda-forge packages and named environments below.
#
# Quick start:
#   pixi install                  # default env (test feature, CPU)
#   pixi run test                 # run the test suite
#   pixi run -e docs docs         # build the documentation locally
#   pixi run -e cuda12 test       # run tests against a CUDA 12 stack
#   pixi run -e cuda13 test       # run tests against a CUDA 13 stack
# ---------------------------------------------------------------------------

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

# Default dependencies present in *every* environment.  These are the runtime
# dependencies of parallelproj itself (binary backend + numerical stack +
# matplotlib for the show_* visualization methods on the scanner / LOR
# descriptor / projector classes); higher-level dev / test / docs / GPU deps
# are added in features below.
[tool.pixi.dependencies]
python = "3.12.*"
parallelproj-core = ">=2.0.5"
numpy = ">=1.23"
scipy = ">=1.15"
array-api-compat = ">=1.7"
matplotlib = "*"

# Install the package itself in editable mode for development.
[tool.pixi.pypi-dependencies]
parallelproj = { path = ".", editable = true }

# ---- features ----

[tool.pixi.feature.test.dependencies]
pytest = ">=8"
pytest-cov = "*"
array-api-strict = "*"
pytorch = "*"

# Tasks defined under a feature are only available in environments that
# include that feature.  When the user runs ``pixi run test`` (no -e flag),
# pixi picks the first environment that has the task — which, with the
# environment ordering below, is the dedicated ``test`` env.
[tool.pixi.feature.test.tasks]
test = "pytest tests/ -v"
test-cov = "pytest tests/ --cov=parallelproj --cov-report=term-missing"

[tool.pixi.feature.docs.dependencies]
sphinx = "*"
sphinx-gallery = "*"
sphinx-design = "*"
furo = "*"
sphinxcontrib-bibtex = "*"
joblib = "*"        # used by sphinx-gallery for parallel example execution
pytorch = "*"        # docs/examples/05_torch/01_run_projection_layer.py uses torch
# matplotlib is declared in [tool.pixi.dependencies] (runtime dep of parallelproj)

[tool.pixi.feature.docs.tasks]
docs = "sphinx-build -b html docs docs/_build/html"
docs-clean = "rm -rf docs/_build docs/auto_examples"

# CUDA 12 stack ---------------------------------------------------------
#
# GPU environments only make sense on linux-64 (where conda-forge ships
# CUDA-enabled builds of pytorch and cupy).  The cuda-version constraint
# plus system-requirements.cuda steer the solver towards the cuda-12
# variants of pytorch/cupy automatically.
[tool.pixi.feature.cuda12]
platforms = ["linux-64"]
system-requirements = { cuda = "12" }

[tool.pixi.feature.cuda12.dependencies]
cuda-version = "12.*"
cupy = "*"

# CUDA 13 stack ---------------------------------------------------------
[tool.pixi.feature.cuda13]
platforms = ["linux-64"]
system-requirements = { cuda = "13" }

[tool.pixi.feature.cuda13.dependencies]
cuda-version = "13.*"
cupy = "*"

# ---- environments ----
#
# Each entry composes one or more features into a named environment that
# pixi can solve, lock, and install independently:
#
#   default   - minimal "runtime only" env -- just parallelproj + its
#               runtime deps.  Useful for ``pixi shell`` -based interactive
#               use, notebooks, or downstream consumers who don't need the
#               test stack.
#   test      - default + pytest / array-api-strict / pytorch (CPU).
#   docs      - default + sphinx + sphinx-gallery + friends.
#   cuda12    - test + CUDA 12 (pytorch & cupy resolve to cuda-12 builds).
#   cuda13    - test + CUDA 13 (pytorch & cupy resolve to cuda-13 builds).
#
# Order matters when tasks are shared across envs: ``pixi run <task>``
# picks the first env that has the task.  Putting ``test`` before the cuda
# envs makes ``pixi run test`` default to the CPU-only test env, which is
# what we want.
[tool.pixi.environments]
default = { features = [] }
test = { features = ["test"] }
docs = { features = ["docs"] }
cuda12 = { features = ["test", "cuda12"] }
cuda13 = { features = ["test", "cuda13"] }
