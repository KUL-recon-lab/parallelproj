[build-system]
requires = ["setuptools>=80", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "parallelproj"
dynamic = ["version"]
description = "Python tools for PET projection and reconstruction workflows."
readme = "README.md"
requires-python = ">=3.12"
license = {text = "Apache-2.0"}
authors = [
  {name = "Georg Schramm"},
]
dependencies = [
  # NOTE: ``parallelproj-core`` is intentionally NOT listed here.  It is a
  # conda-forge-only binary backend with no PyPI distribution; the
  # conda-forge recipe declares it independently, and pixi pulls it in via
  # ``[tool.pixi.dependencies]`` below.  Listing it as a PEP 621 dependency
  # would cause any PyPI-based resolver (pip, uv, pixi's PyPI resolver) to
  # fail because the package cannot be found on PyPI.
  "numpy>=1.23",
  "scipy>=1.15",
  "array-api-compat>=1.7",
  "matplotlib",
]

# NOTE: there is intentionally no ``[project.optional-dependencies]`` block.
# ``parallelproj`` is distributed only via conda-forge, so pip-installable
# "extras" (``pip install 'parallelproj[test]'``) are not a supported path.
# In addition, pixi auto-imports any ``[project.optional-dependencies]``
# entries as features with the same name, which then *merges* with the
# explicit ``[tool.pixi.feature.*]`` blocks below — leading to duplicate
# definitions resolved via two different package indices.  Test- and
# docs-time dependencies are declared once, conda-forge-side, under
# ``[tool.pixi.feature.test.dependencies]`` and
# ``[tool.pixi.feature.docs.dependencies]``.

[tool.setuptools_scm]
parentdir_prefix_version = "v"
fallback_version = "0.0.0"
version_scheme = "no-guess-dev"
local_scheme = "node-and-date"

[tool.pytest.ini_options]
testpaths = ["tests"]

# ---------------------------------------------------------------------------
# pixi configuration
# ---------------------------------------------------------------------------
#
# This section configures the pixi package manager (https://pixi.sh/) for
# development, testing, documentation, and GPU workflows.  Pixi reads the
# project metadata from [project] above (name, version, dependencies) and
# augments it with conda-forge packages and named environments below.
#
# Quick start:
#   pixi install                  # default env (test feature, CPU)
#   pixi run test                 # run the test suite
#   pixi run -e docs docs         # build the documentation locally
#   pixi run -e cuda12 test       # run tests against a CUDA 12 stack
#   pixi run -e cuda13 test       # run tests against a CUDA 13 stack
# ---------------------------------------------------------------------------

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

# Default dependencies present in *every* environment.  These are the runtime
# dependencies of parallelproj itself (binary backend + numerical stack +
# matplotlib for the show_* visualization methods on the scanner / LOR
# descriptor / projector classes); higher-level dev / test / docs / GPU deps
# are added in features below.
[tool.pixi.dependencies]
python = "3.12.*"
parallelproj-core = ">=2.0.5"
numpy = ">=1.23"
scipy = ">=1.15"
array-api-compat = ">=1.7"
matplotlib = "*"

# Install the package itself in editable mode for development.
[tool.pixi.pypi-dependencies]
parallelproj = { path = ".", editable = true }

# ---- features ----

[tool.pixi.feature.test.dependencies]
pytest = ">=8"
pytest-cov = "*"
array-api-strict = "*"
pytorch = "*"

[tool.pixi.feature.docs.dependencies]
sphinx = "*"
sphinx-gallery = "*"
sphinx-design = "*"
furo = "*"
sphinxcontrib-bibtex = "*"
joblib = "*"        # used by sphinx-gallery for parallel example execution
pytorch = "*"        # docs/examples/05_torch/01_run_projection_layer.py uses torch
# matplotlib is declared in [tool.pixi.dependencies] (runtime dep of parallelproj)

# CUDA 12 stack ---------------------------------------------------------
#
# GPU environments only make sense on linux-64 (where conda-forge ships
# CUDA-enabled builds of pytorch and cupy).  The cuda-version constraint
# plus system-requirements.cuda steer the solver towards the cuda-12
# variants of pytorch/cupy automatically.
[tool.pixi.feature.cuda12]
platforms = ["linux-64"]
system-requirements = { cuda = "12" }

[tool.pixi.feature.cuda12.dependencies]
cuda-version = "12.*"
cupy = "*"

# CUDA 13 stack ---------------------------------------------------------
[tool.pixi.feature.cuda13]
platforms = ["linux-64"]
system-requirements = { cuda = "13" }

[tool.pixi.feature.cuda13.dependencies]
cuda-version = "13.*"
cupy = "*"

# ---- environments ----
#
# Each entry composes one or more features into a named environment that
# pixi can solve, lock, and install independently:
#
#   default   - CPU-only dev / test environment (the implicit `pixi install`).
#   docs      - everything sphinx + sphinx-gallery need to build the docs.
#   cuda12    - default + CUDA 12 (pytorch & cupy resolve to cuda-12 builds).
#   cuda13    - default + CUDA 13 (pytorch & cupy resolve to cuda-13 builds).
[tool.pixi.environments]
default = { features = ["test"] }
docs = { features = ["docs"] }
cuda12 = { features = ["test", "cuda12"] }
cuda13 = { features = ["test", "cuda13"] }

# ---- tasks ----
#
# Named commands runnable via `pixi run <task>` (default env) or
# `pixi run -e <env> <task>` (specific env).  Keep these in sync with what
# CI runs so contributors can reproduce CI failures locally with one command.
[tool.pixi.tasks]
test = "pytest tests/ -v"
test-cov = "pytest tests/ --cov=parallelproj --cov-report=term-missing"
docs = "sphinx-build -b html docs docs/_build/html"
docs-clean = "rm -rf docs/_build docs/auto_examples"
