[build-system]
requires = ["setuptools>=80", "setuptools-scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "parallelproj"
dynamic = ["version"]
requires-python = ">=3.12"
dependencies = [
    "parallelproj-core>=2.0.4",
    "numpy>=1.23",
    "scipy>=1.8",
    "array-api-compat>=1.7",
]

[tool.setuptools_scm]
parentdir_prefix_version = "v"
fallback_version = "0.0.0"
version_scheme = "no-guess-dev"
local_scheme = "node-and-date"

[project.urls]
Homepage = "https://github.com/gschramm/parallelproj"

[tool.coverage.report]
exclude_lines = [
    "def __repr__",
    "if verbose:",
    "if self._debug:",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
    "if parallelproj.is_cuda_array",
    "if is_cuda_array",
    "if cuda_present:",
    "def is_cuda_array",
    "def empty_cuda_cache",
    "if num_visible_cuda_devices > 0",
    "if cupy_enabled",
    "lib_parallelproj_c_fname",
    "empty_cuda_cache",
    "__str__",
    "Array =",
    "elif not cupy_enabled and torch_enabled",
    "elif cupy_enabled and not torch_enabled"
]
